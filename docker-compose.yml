---
services:
  db:
    image: postgres:16-alpine
    container_name: tasktracker-db
    user: postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tasktracker
    # WARNING: If deploying on a server running WUD (What's Up Docker), add the label
    # wud.watch=false to this service — WUD will auto-upgrade postgres to an incompatible
    # beta version and break the container. See compose.traefik.yml for the production config.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: itlostandfound/task-tracker:latest
    container_name: tasktracker-app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasktracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  tasktracker:
    driver: bridge
