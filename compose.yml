---
services:
  db:
    image: postgres:16-alpine
    container_name: trackerpostgres
    env_file: .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # host port removed -- internal only via traefik-public network
    # ports:
    #   - "5432:5432"
    networks:
      - tracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: trackerbackend
    # host port removed -- internal only via traefik-public network
    # ports:
    #   - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tracker
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      # test: ["CMD", "curl", "-f", "http://api/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: trackerfrontend
    # host port removed -- traefik handles HTTPS ingress
    # ports:
    #   - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - traefik
      - tracker
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"   # ⭐ REQUIRED
      - "traefik.http.routers.tasktracker.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.tasktracker.entrypoints=https"
      - "traefik.http.routers.tasktracker.tls=true"
      - "traefik.http.services.tasktracker.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
  tracker:
    external: true