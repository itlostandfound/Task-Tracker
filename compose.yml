---
services:
  trdb:
    image: postgres:16-alpine
    container_name: trackerpostgres
    user: postgres
    env_file: .env
    volumes:
      - ./postgresdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tracker
    # WARNING: If deploying on a server running WUD (What's Up Docker), add the label
    # wud.watch=false to this service — WUD will auto-upgrade postgres to an incompatible
    # beta version and break the container. See compose.traefik.yml for the production config.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: itlostandfound/task-tracker:latest
    container_name: trackerapp
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@trdb:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      trdb:
        condition: service_healthy
    networks:
      - tracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  tracker:
    driver: bridge
