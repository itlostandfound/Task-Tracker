---
services:
  db:
    image: postgres:16-alpine
    container_name: trackerpostgres
    env_file: .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: itlostandfound/task-tracker:latest
    container_name: trackerapp
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tracker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  tracker:
    driver: bridge
